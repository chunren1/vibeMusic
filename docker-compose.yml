# ============================================================
# 通用日志配置（限制大小 + 轮转）
# ============================================================
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ==========================
  # MySQL 8.0 — 关系数据库
  # ==========================
  mysql:
    image: mysql:8.0
    container_name: vibemusic-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: vibemusic
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 数据持久化
      - ./docker-data/mysql/data:/var/lib/mysql
      # 初始化 SQL（首次启动自动执行）
      - ./vibeMusic-backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      # 慢查询日志（超过 1 秒记录）
      - --slow_query_log=ON
      - --slow_query_log_file=/var/lib/mysql/slow.log
      - --long_query_time=1
      - --log_queries_not_using_indexes=ON
      - --log_slow_admin_statements=ON
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================
  # Redis 7 — 缓存 & 会话
  # ==========================
  redis:
    image: redis:7-alpine
    container_name: vibemusic-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      # 数据持久化
      - ./docker-data/redis/data:/data
      # 自定义配置
      - ./docker-data/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5


  # ==========================
  # Elasticsearch 8.11 — 全文搜索引擎
  # ==========================
  elasticsearch:
    image: elasticsearch:8.18.0
    container_name: vibemusic-es
    restart: unless-stopped
    logging: *default-logging
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "9201:9200"
    volumes:
      # ES 数据
      - ./docker-data/elasticsearch/data:/usr/share/elasticsearch/data
      # IK 插件持久化
      - ./docker-data/elasticsearch/plugins:/usr/share/elasticsearch/plugins
      # 启动脚本（含 IK 自动安装）
      - ./docker-data/elasticsearch/es-start.sh:/es-start.sh:ro
    command: ["/bin/bash", "/es-start.sh"]
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ==========================
  # musicapi — 网易云 + QQ 音乐统一 API 代理 (Node.js)
  # ==========================
  musicapi:
    build:
      context: ./musicapi
      dockerfile: Dockerfile
    image: vibemusic-musicapi:latest
    container_name: vibemusic-musicapi
    restart: unless-stopped
    logging: *default-logging
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================
  # MinIO — RustFS 对象存储
  # ==========================
  rustfs:
    image: minio/minio:latest
    container_name: vibemusic-rustfs
    restart: unless-stopped
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rustfsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ChangeMe456!}
      TZ: Asia/Shanghai
    ports:
      # API 端口（S3 兼容）
      - "9000:9000"
      # Web 控制台
      - "9001:9001"
    volumes:
      # 对象数据持久化
      - ./docker-data/rustfs/data:/data
    command: server /data --console-address ":9001"
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================
  # Spring Boot 后端 — vibeMusic API
  # ==========================
  backend:
    build:
      context: ./vibeMusic-backend
      dockerfile: Dockerfile
    image: vibemusic-backend:latest
    container_name: vibemusic-backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      # 数据库
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Elasticsearch
      ES_URI: http://elasticsearch:9200
      # MinIO / RustFS
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-ChangeMe456!}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-ChangeMeJWTSecretKey123!}
      # AI 助手
      AI_API_KEY: ${AI_API_KEY:-change-me}
      # musicapi (网易云 API 代理)
      MUSICAPI_URL: http://musicapi:3000
      # Profile
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - vibemusic-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      musicapi:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================
  # Nginx — 统一入口 & 反向代理
  # ==========================
  nginx:
    image: nginx:1.27-alpine
    container_name: vibemusic-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
    volumes:
      # Nginx 配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 前端构建产物
      - ./vibemusic-web/dist:/usr/share/nginx/html:ro
      # 日志持久化
      - ./docker-data/nginx/logs:/var/log/nginx
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  rustfs-init:
    image: minio/mc:latest
    container_name: vibemusic-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set rustfs http://rustfs:9000 ${MINIO_ROOT_USER:-rustfsadmin} ${MINIO_ROOT_PASSWORD:-ChangeMe456!};
      /usr/bin/mc mb --ignore-existing rustfs/vibemusic;
      echo 'Bucket vibemusic ready';
      exit 0;
      "
    networks:
      - vibemusic-net

  # ==========================
  # Prometheus — 指标采集与存储
  # ==========================
  prometheus:
    image: prom/prometheus:latest
    container_name: vibemusic-prometheus
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9090:9090"
    volumes:
      - ./docker-data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker-data/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./docker-data/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================
  # Grafana — 指标可视化仪表盘
  # ==========================
  grafana:
    image: grafana/grafana:11.5.2
    container_name: vibemusic-grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: Asia/Shanghai
    ports:
      - "3001:3000"
    volumes:
      - ./docker-data/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker-data/grafana/data:/var/lib/grafana
    networks:
      - vibemusic-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================
  # Alertmanager — 告警通知管理
  # ==========================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: vibemusic-alertmanager
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9093:9093"
    volumes:
      - ./docker-data/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./docker-data/alertmanager/data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

# ==========================
# 独立数据卷（宿主机挂载）
# ==========================
networks:
  vibemusic-net:
    driver: bridge
    name: vibemusic-net
