version: "3.9"

services:
  # ==========================
  # MySQL 8.0 — 关系数据库
  # ==========================
  mysql:
    image: mysql:8.0
    container_name: vibemusic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: vibemusic
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 数据持久化
      - ./docker-data/mysql/data:/var/lib/mysql
      # 初始化 SQL（首次启动自动执行）
      - ./vibeMusic-backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================
  # Redis 7 — 缓存 & 会话
  # ==========================
  redis:
    image: redis:7-alpine
    container_name: vibemusic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      # 数据持久化
      - ./docker-data/redis/data:/data
      # 自定义配置
      - ./docker-data/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5


  # ==========================
  # Elasticsearch 8.11 — 全文搜索引擎
  # ==========================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: vibemusic-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      # ES 数据
      - ./docker-data/elasticsearch/data:/usr/share/elasticsearch/data
      # IK 插件持久化
      - ./docker-data/elasticsearch/plugins:/usr/share/elasticsearch/plugins
      # 启动脚本（含 IK 自动安装）
      - ./docker-data/elasticsearch/es-start.sh:/es-start.sh:ro
    command: ["/bin/bash", "/es-start.sh"]
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ==========================
  # MinIO — RustFS 对象存储
  # ==========================
  rustfs:
    image: minio/minio:latest
    container_name: vibemusic-rustfs
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: rustfsadmin
      MINIO_ROOT_PASSWORD: rustfsadmin
      TZ: Asia/Shanghai
    ports:
      # API 端口（S3 兼容）
      - "9000:9000"
      # Web 控制台
      - "9001:9001"
    volumes:
      # 对象数据持久化
      - ./docker-data/rustfs/data:/data
    command: server /data --console-address ":9001"
    networks:
      - vibemusic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================
  # MinIO 初始化 — 自动创建 Bucket
  # ==========================
  rustfs-init:
    image: minio/mc:latest
    container_name: vibemusic-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin;
      /usr/bin/mc mb --ignore-existing rustfs/vibemusic;
      echo 'Bucket vibemusic ready';
      exit 0;
      "
    networks:
      - vibemusic-net

# ==========================
# 独立数据卷（宿主机挂载）
# ==========================
networks:
  vibemusic-net:
    driver: bridge
    name: vibemusic-net
