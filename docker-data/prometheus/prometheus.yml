# Prometheus 全局配置
global:
  scrape_interval: 15s          # 每 15s 抓取一次指标
  evaluation_interval: 15s      # 每 15s 评估一次告警规则

# 告警规则文件
rule_files:
  - "alert-rules.yml"

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# 抓取目标
scrape_configs:
  # ── Spring Boot 后端 ──
  # 本地开发模式：后端在 IntelliJ 运行，用 host.docker.internal 访问宿主机
  # Docker 部署模式：后端在容器中，用 backend:8080 访问
  - job_name: 'vibemusic-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'spring-boot'
          application: 'vibemusic-backend'

  # ── musicapi Express 网关（已集成 prom-client /metrics）──
  - job_name: 'musicapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'express-bff'

  # ── Prometheus 自身 ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── MySQL Exporter (可选，需要额外启动 mysqld-exporter 容器) ──
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysqld-exporter:9104']

  # ── Redis Exporter (可选) ──
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
