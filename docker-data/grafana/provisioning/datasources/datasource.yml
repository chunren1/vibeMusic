# Grafana 数据源自动配置
apiVersion: 1

datasources:
  # Prometheus 指标数据源
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  # Loki 日志数据源（如启用 Loki 日志聚合）
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
