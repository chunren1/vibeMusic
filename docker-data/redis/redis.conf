# ======================
# vibeMusic Redis 配置
# ======================

# 绑定地址（Docker 内部通信）
bind 0.0.0.0

# 端口
port 6379

# 守护进程模式（Docker 内必须为 no）
daemonize no

# ===== 持久化 =====
# RDB 快照
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# AOF 持久化（推荐开启）
appendonly yes
appendfilename "appendonly.aof"

# AOF 同步策略：每秒同步一次（性能与安全的平衡）
appendfsync everysec

# AOF 自动重写阈值
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ===== 内存 =====
maxmemory 256mb
maxmemory-policy allkeys-lru

# ===== 日志 =====
loglevel notice
logfile ""

# ===== 网络 =====
tcp-keepalive 300
timeout 0
