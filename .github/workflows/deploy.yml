# vibeMusic 自动部署流水线
# 触发: 手动触发 / 推送 tag (v*.*.*)
name: Deploy

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'          # 推送 tag 如 v1.0.0 时自动部署

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend Tests
        run: cd vibeMusic-backend && mvn test -B

      - name: Frontend Install & Test
        run: cd vibemusic-web && npm ci && npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backend JAR
        run: cd vibeMusic-backend && mvn package -DskipTests -B

      - name: Build Frontend
        run: cd vibemusic-web && npm ci && npm run build

      - name: Docker Compose Build
        run: docker compose build

      - name: Deploy Notification
        run: echo "Build completed. Manual deployment required or configure auto-deploy target."
