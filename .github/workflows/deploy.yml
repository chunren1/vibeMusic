# ============================================================
# vibeMusic CD 自动部署
# 触发条件：手动触发 或 推送 tag (v*)
# ============================================================
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    tags:
      - 'v*'

jobs:
  build-backend:
    name: Build Backend JAR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      artifact: backend-jar

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Maven Package (skip tests, CI already ran)
        run: mvn package -B -DskipTests
        working-directory: vibeMusic-backend

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: vibeMusic-backend/target/*.jar
          retention-days: 3

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vibemusic-web/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        working-directory: vibemusic-web

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: vibemusic-web/dist/
          retention-days: 3

  deploy:
    name: Deploy to Server
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: vibeMusic-backend/target/

      - name: Download Frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: vibemusic-web/dist/

      - name: Build Docker Images
        run: |
          docker compose build --no-cache
          docker compose push

      - name: Deploy
        run: |
          docker compose down
          docker compose up -d --pull always
          docker compose ps

      - name: Health Check
        run: |
          echo "Waiting for services to be healthy..."
          sleep 20
          curl -sf http://localhost:80/ || echo "Nginx not ready"
          curl -sf http://localhost:8080/actuator/health || echo "Backend not ready"
