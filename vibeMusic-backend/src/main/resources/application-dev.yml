# ===== vibeMusic 开发环境配置 =====
# 激活方式: spring.profiles.active=dev (默认)
# 命令行: mvn spring-boot:run -Dspring-boot.run.profiles=dev

logging:
  level:
    com.vibemusic: debug
    org.springframework.security: debug
    org.springframework.web: debug

flyway:
  enabled: true
  baseline-on-migrate: true

knife4j:
  enable: true
