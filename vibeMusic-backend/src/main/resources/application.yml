server:
  port: 8080

spring:
  application:
    name: vibeMusic-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://localhost:3306/vibemusic?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:SyQ8bG9uZ1NlY3JldEtleUZvclZpYmVNdXNpY1Byb2plY3QyMDI2}
  expiration: 86400000

netease:
  api:
    base-url: ${MUSICAPI_URL:http://localhost:3000}
    timeout: 10000

storage:
  rustfs:
    endpoint: ${RUSTFS_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
    secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
    bucket-name: ${RUSTFS_BUCKET:vibemusic}
    data-path: ${RUSTFS_DATA_PATH:D:\\Rustfsdata}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.vibemusic

knife4j:
  enable: true
  setting:
    language: zh_cn
