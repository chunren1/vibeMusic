server:
  port: 8080

spring:
  application:
    name: vibeMusic-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/vibemusic?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 600000
      idle-timeout: 300000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  elasticsearch:
    uris:
      - ${ES_URI:http://localhost:9201}
    connection-timeout: 5s
    socket-timeout: 10s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:vibeMusic-dev-only-change-in-production}
  expiration: 86400000

ai:
  api-key: ${AI_API_KEY:}

netease:
  api:
    base-url: ${MUSICAPI_URL:http://localhost:3000}
    timeout: 10000

storage:
  rustfs:
    endpoint: ${RUSTFS_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
    secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
    bucket-name: ${RUSTFS_BUCKET:vibemusic}
    data-path: ${RUSTFS_DATA_PATH:D:\\Rustfsdata}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.vibemusic

# Actuator 监控: 暴露 health + prometheus + metrics 端点
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: vibemusic-backend
    distribution:
      percentiles-histogram:
        search.latency: true
      percentiles:
        search.latency: 0.5,0.95,0.99
